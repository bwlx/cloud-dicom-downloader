name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-desktop.txt
            requirements-packaging.txt

      - name: Determine build version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "0.0.${{ github.run_number }}"
          }

          "BUILD_VERSION=$version" >> $env:GITHUB_ENV
          "ZIP_NAME=Cloud-DICOM-Downloader-windows-$version.zip" >> $env:GITHUB_ENV
          "SETUP_NAME=Cloud-DICOM-Downloader-Setup-$version.exe" >> $env:GITHUB_ENV

      - name: Detect OSS upload configuration
        shell: pwsh
        env:
          OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
          OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
          OIDC_PROVIDER_ARN: ${{ secrets.ALIYUN_OIDC_PROVIDER_ARN }}
          ROLE_TO_ASSUME: ${{ secrets.ALIYUN_ROLE_TO_ASSUME }}
          ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          $hasBucket = -not [string]::IsNullOrWhiteSpace($env:OSS_BUCKET)
          $hasEndpoint = -not [string]::IsNullOrWhiteSpace($env:OSS_ENDPOINT)
          $hasOidc = (-not [string]::IsNullOrWhiteSpace($env:OIDC_PROVIDER_ARN)) -and (-not [string]::IsNullOrWhiteSpace($env:ROLE_TO_ASSUME))
          $hasAkSk = (-not [string]::IsNullOrWhiteSpace($env:ACCESS_KEY_ID)) -and (-not [string]::IsNullOrWhiteSpace($env:ACCESS_KEY_SECRET))
          $enabled = $hasBucket -and $hasEndpoint -and ($hasOidc -or $hasAkSk)

          "OSS_UPLOAD_ENABLED=$($enabled.ToString().ToLowerInvariant())" >> $env:GITHUB_ENV
          "OSS_USE_OIDC=$($hasOidc.ToString().ToLowerInvariant())" >> $env:GITHUB_ENV
          "OSS_USE_ACCESS_KEY=$($hasAkSk.ToString().ToLowerInvariant())" >> $env:GITHUB_ENV

      - name: Configure Alibaba Cloud credentials
        if: env.OSS_UPLOAD_ENABLED == 'true' && env.OSS_USE_OIDC == 'true'
        id: aliyun-creds
        uses: aliyun/configure-aliyun-credentials-action@v1
        with:
          oidc-provider-arn: ${{ secrets.ALIYUN_OIDC_PROVIDER_ARN }}
          role-to-assume: ${{ secrets.ALIYUN_ROLE_TO_ASSUME }}
          role-session-name: github-action-session

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Ensure GitHub CLI is available
        shell: pwsh
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            choco install gh --no-progress -y
          }
          gh --version

      - name: Build Windows package
        shell: pwsh
        run: .\build_windows.ps1 -Version $env:BUILD_VERSION

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup-${{ env.BUILD_VERSION }}
          path: dist/${{ env.SETUP_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ env.BUILD_VERSION }}
          path: dist/${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload packages to OSS
        if: env.OSS_UPLOAD_ENABLED == 'true'
        shell: pwsh
        env:
          ALIYUN_OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
          ALIYUN_OSS_ENDPOINT: ${{ vars.ALIYUN_OSS_ENDPOINT }}
          ALIYUN_OSS_PREFIX: ${{ vars.ALIYUN_OSS_PREFIX }}
          ALIYUN_OSS_PUBLIC_BASE_URL: ${{ vars.ALIYUN_OSS_PUBLIC_BASE_URL }}
          ALIYUN_ACCESS_KEY_ID: ${{ steps.aliyun-creds.outputs['aliyun-access-key-id'] || secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ steps.aliyun-creds.outputs['aliyun-access-key-secret'] || secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_STS_TOKEN: ${{ steps.aliyun-creds.outputs['aliyun-security-token'] || secrets.ALIYUN_STS_TOKEN }}
        run: |
          $files = @(
            "dist/$env:SETUP_NAME",
            "dist/$env:ZIP_NAME"
          )

          if ("${{ github.ref_type }}" -eq "tag") {
            .\upload_oss.ps1 -Version $env:BUILD_VERSION -Files $files -UpdateLatest
          } else {
            .\upload_oss.ps1 -Version $env:BUILD_VERSION -Files $files
          }

      - name: Publish release assets
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $zipPath = "dist/$env:ZIP_NAME"
          $setupPath = "dist/$env:SETUP_NAME"

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              $zipPath `
              $setupPath `
              --verify-tag `
              --generate-notes `
              --repo $env:GITHUB_REPOSITORY
          } else {
            gh release upload $tag `
              $zipPath `
              $setupPath `
              --clobber `
              --repo $env:GITHUB_REPOSITORY
          }
