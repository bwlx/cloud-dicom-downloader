name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.set-version.outputs.build_version }}
      windows_zip_name: ${{ steps.set-version.outputs.windows_zip_name }}
      windows_setup_name: ${{ steps.set-version.outputs.windows_setup_name }}
      macos_dmg_name: ${{ steps.set-version.outputs.macos_dmg_name }}
    steps:
      - name: Determine build version
        id: set-version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.${{ github.run_number }}"
          fi

          {
            echo "build_version=$version"
            echo "windows_zip_name=Cloud-DICOM-Downloader-windows-$version.zip"
            echo "windows_setup_name=Cloud-DICOM-Downloader-Setup-$version.exe"
            echo "macos_dmg_name=Cloud-DICOM-Downloader-macOS-unsigned-$version.dmg"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    runs-on: windows-latest
    needs: determine-version
    env:
      BUILD_VERSION: ${{ needs.determine-version.outputs.build_version }}
      ZIP_NAME: ${{ needs.determine-version.outputs.windows_zip_name }}
      SETUP_NAME: ${{ needs.determine-version.outputs.windows_setup_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-desktop.txt
            requirements-packaging.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows package
        shell: pwsh
        run: .\build_windows.ps1 -Version $env:BUILD_VERSION

      - name: Upload Windows setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup-${{ env.BUILD_VERSION }}
          path: dist/${{ env.SETUP_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ env.BUILD_VERSION }}
          path: dist/${{ env.ZIP_NAME }}
          if-no-files-found: error
          retention-days: 14

  build-macos:
    runs-on: macos-latest
    needs: determine-version
    env:
      BUILD_VERSION: ${{ needs.determine-version.outputs.build_version }}
      DMG_NAME: ${{ needs.determine-version.outputs.macos_dmg_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-desktop.txt
            requirements-packaging.txt

      - name: Build macOS package
        shell: bash
        run: ./build_macos.sh "$BUILD_VERSION"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ env.BUILD_VERSION }}
          path: dist/${{ env.DMG_NAME }}
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs:
      - determine-version
      - build-windows
      - build-macos
    env:
      BUILD_VERSION: ${{ needs.determine-version.outputs.build_version }}
      ZIP_NAME: ${{ needs.determine-version.outputs.windows_zip_name }}
      SETUP_NAME: ${{ needs.determine-version.outputs.windows_setup_name }}
      DMG_NAME: ${{ needs.determine-version.outputs.macos_dmg_name }}
    steps:
      - name: Download Windows setup artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-setup-${{ env.BUILD_VERSION }}
          path: release-assets/windows-setup

      - name: Download Windows portable artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-portable-${{ env.BUILD_VERSION }}
          path: release-assets/windows-portable

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: macos-dmg-${{ env.BUILD_VERSION }}
          path: release-assets/macos

      - name: Ensure GitHub CLI is available
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi
          gh --version

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          zip_path="release-assets/windows-portable/$ZIP_NAME"
          setup_path="release-assets/windows-setup/$SETUP_NAME"
          dmg_path="release-assets/macos/$DMG_NAME"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" \
              "$zip_path" \
              "$setup_path" \
              "$dmg_path" \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" \
              "$zip_path" \
              "$setup_path" \
              "$dmg_path" \
              --verify-tag \
              --generate-notes \
              --repo "$GITHUB_REPOSITORY"
          fi
